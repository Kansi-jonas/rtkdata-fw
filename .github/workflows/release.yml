name: release

# Tag a release (e.g. `git tag v1.0.1 && git push origin v1.0.1`) to build the
# firmware and publish it to the OTA channel: copies rtkdata-fw.bin + www.bin into
# ota/ and bumps ota/release.json to the tag version, committed back to main. The
# box-side OTA (update.c) then sees the new version and self-updates.
#
# NOTE: this commits the .bin into the repo (same model OnoLink used on gitlab, and
# what raw.githubusercontent OTA needs). If repo size becomes a concern, switch the
# OTA URL to GitHub Release assets or S3.
#
# TODO: inject the fleet provisioning secret here (RTK_ENROLL_SECRET) from a GitHub
# secret instead of the source placeholder, before this goes to real devices.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: ESP-IDF build (v5.3.1, esp32)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32
          path: '.'

      - name: Publish to OTA channel
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          echo "publishing version ${VER}"
          cp build/rtkdata-fw.bin ota/rtkdata-fw.bin
          cp build/www.bin       ota/www.bin
          python3 - "$VER" <<'PY'
          import json, sys
          p = "ota/release.json"
          d = json.load(open(p))
          d["version"] = sys.argv[1]
          json.dump(d, open(p, "w"), indent=2)
          open(p, "a").write("\n")
          PY
          git config user.name  "rtkdata-ci"
          git config user.email "ci@rtkdata.com"
          git add ota/rtkdata-fw.bin ota/www.bin ota/release.json
          git commit -m "release: ${GITHUB_REF_NAME} (firmware + www + manifest)"
          git push origin HEAD:main

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ota/rtkdata-fw.bin
            ota/www.bin
