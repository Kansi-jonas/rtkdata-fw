name: release

# Stage a release (build + DRAFT GitHub Release). NOTHING reaches a field device here.
#
#   1. bump FW_VERSION in main/include/config.h, commit
#   2. git tag v1.0.7 && git push origin v1.0.7
#   3. this builds the firmware, verifies FW_VERSION == tag, and creates a DRAFT
#      release with rtkdata-fw.bin + www.bin attached
#   4. review the draft on the Releases page, then click "Publish release"
#      -> the promote-ota workflow writes it to the OTA channel (main/ota/) and
#         the fleet self-updates within ~24h
#
# The "Publish release" click is the only thing that goes live (the Freigabe).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify FW_VERSION matches the tag
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          FW=$(grep -oP '#define\s+FW_VERSION\s+"\K[^"]+' main/include/config.h)
          echo "tag=${VER}  FW_VERSION=${FW}"
          if [ "${VER}" != "${FW}" ]; then
            echo "::error::tag ${VER} != FW_VERSION ${FW} (bump config.h first; a mismatch causes an OTA re-flash loop)"
            exit 1
          fi

      - name: ESP-IDF build (v5.3.1, esp32)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32
          path: '.'

      - name: Draft GitHub Release (review, then Publish to go live)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            Firmware ${{ github.ref_name }}.

            This is a DRAFT. Review the attached binaries, then click "Publish release"
            to push it to the OTA channel. The fleet self-updates within ~24h (boot
            check + daily 00:00 poll). Only publish a version reachable by the 1.0.4+
            OTA path; pre-1.0.4 devices must be USB-reflashed.
          files: |
            build/rtkdata-fw.bin
            build/www.bin
